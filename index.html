<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Lab 이미지 변환기</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="이미지 변환 도구" data-i18n-attr="aria-label:appAria">
        <div class="topbar">
          <div>
            <p class="eyebrow">Canvas Lab</p>
            <h1 data-i18n="title">이미지 변환기</h1>
          </div>
          <div class="topbar-actions">
            <div class="language-picker" id="languagePicker">
              <button
                class="language-button"
                id="languageButton"
                type="button"
                aria-expanded="false"
                aria-haspopup="true"
                aria-label="언어 선택"
                data-i18n-attr="aria-label:languageSelect"
              >
                <span class="globe-icon" aria-hidden="true">🌐</span>
                <span class="flag-badge" id="currentFlag" aria-hidden="true">🇰🇷</span>
                <span id="currentLanguageName">한국어</span>
              </button>
              <div class="language-menu" id="languageMenu" role="menu" hidden>
                <button type="button" role="menuitemradio" data-lang="ko">
                  <span class="flag-badge" aria-hidden="true">🇰🇷</span>
                  <span>한국어</span>
                </button>
                <button type="button" role="menuitemradio" data-lang="en">
                  <span class="flag-badge" aria-hidden="true">🇺🇸</span>
                  <span>English</span>
                </button>
                <button type="button" role="menuitemradio" data-lang="ja">
                  <span class="flag-badge" aria-hidden="true">🇯🇵</span>
                  <span>日本語</span>
                </button>
                <button type="button" role="menuitemradio" data-lang="zh">
                  <span class="flag-badge" aria-hidden="true">🇨🇳</span>
                  <span>中文</span>
                </button>
                <button type="button" role="menuitemradio" data-lang="fr">
                  <span class="flag-badge" aria-hidden="true">🇫🇷</span>
                  <span>Français</span>
                </button>
              </div>
            </div>
            <button class="ghost-button" id="resetButton" type="button" data-i18n="reset">초기화</button>
          </div>
        </div>

        <div class="tool-grid">
          <section class="drop-panel" aria-label="이미지 업로드" data-i18n-attr="aria-label:uploadAria">
            <label class="drop-zone" id="dropZone">
              <input id="fileInput" type="file" accept="image/*" />
              <span class="drop-icon" aria-hidden="true">+</span>
              <strong data-i18n="dropTitle">이미지를 끌어오거나 선택</strong>
              <small data-i18n="dropSubtitle">JPEG, PNG, WebP, GIF 등 브라우저가 읽을 수 있는 이미지</small>
            </label>

            <div class="preview-frame">
              <img id="previewImage" alt="선택한 이미지 미리보기" data-i18n-attr="alt:previewAlt" />
              <p id="emptyPreview" data-i18n="emptyPreview">이미지를 올리면 미리보기가 표시됩니다.</p>
            </div>
          </section>

          <section class="control-panel" aria-label="변환 설정" data-i18n-attr="aria-label:settingsAria">
            <div class="file-summary" id="fileSummary">
              <span data-i18n="imageInfo">이미지 정보</span>
            </div>

            <div class="control-group">
              <div class="group-header">
                <h2 data-i18n="pixelSize">픽셀 사이즈</h2>
                <label class="switch">
                  <input id="lockRatio" type="checkbox" checked />
                  <span data-i18n="lockRatio">비율 고정</span>
                </label>
              </div>
              <div class="size-inputs">
                <label>
                  <span data-i18n="width">너비</span>
                  <input id="widthInput" type="number" min="1" placeholder="width" />
                </label>
                <label>
                  <span data-i18n="height">높이</span>
                  <input id="heightInput" type="number" min="1" placeholder="height" />
                </label>
              </div>
              <div class="quick-actions">
                <button data-scale="0.25" type="button">25%</button>
                <button data-scale="0.5" type="button">50%</button>
                <button data-scale="1" type="button" data-i18n="original">원본</button>
                <button data-scale="2" type="button">2x</button>
              </div>
            </div>

            <div class="control-group">
              <h2 data-i18n="formatTitle">확장자 변환</h2>
              <div class="format-options" role="radiogroup" aria-label="출력 포맷" data-i18n-attr="aria-label:formatAria">
                <label><input type="radio" name="format" value="image/png" checked /> PNG</label>
                <label><input type="radio" name="format" value="image/jpeg" /> JPEG</label>
                <label><input type="radio" name="format" value="image/webp" /> WebP</label>
                <label><input type="radio" name="format" value="image/gif" /> GIF</label>
              </div>
            </div>

            <div class="control-group">
              <h2 data-i18n="compressionTitle">이미지 압축</h2>
              <div class="compression-options" role="radiogroup" aria-label="압축률" data-i18n-attr="aria-label:compressionAria">
                <label><input type="radio" name="compression" value="25" /> 25%</label>
                <label><input type="radio" name="compression" value="50" checked /> 50%</label>
                <label><input type="radio" name="compression" value="75" /> 75%</label>
              </div>
              <p class="hint" id="compressionHint">
                JPEG와 WebP는 품질을 낮추면 용량이 줄어듭니다. GIF는 gifsicle-wasm으로 애니메이션을 유지한 채 최적화합니다.
              </p>
            </div>

            <button class="primary-button" id="convertButton" type="button" disabled data-i18n="convert">변환하기</button>

            <div class="result-panel" id="resultPanel" hidden>
              <div>
                <strong data-i18n="resultDone">변환 완료</strong>
                <span id="resultSummary"></span>
              </div>
              <a class="download-button" id="downloadLink" download data-i18n="download">다운로드</a>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="vendor/upng.min.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
